services:
  - type: web
    name: yumquick-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile
    startCommand: node node_modules/tsx/dist/cli.mjs server/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
